  <body>

    <script>
      const TAUX_TVA = 0.2;

      let prixHT = 150,
        prixTTC;

      prixTTC = prixHT + TAUX_TVA * prixHT;

      console.log(
        `Prix HT : ${prixHT} € | TVA (20%) : ${prixHT * TAUX_TVA} € | Prix TTC : ${prixTTC} €`,
      );
    </script>
